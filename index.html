<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sniper Arena</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0f18; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Courier New', monospace; }
  #aw { width: 700px; }
  #hud { display: flex; justify-content: space-between; align-items: center; padding: 9px 14px; background: #0f1a27; border: 1px solid #1a3a5c; border-bottom: none; border-radius: 8px 8px 0 0; }
  .pi { display: flex; flex-direction: column; gap: 4px; }
  .pilabel { font-size: 10px; color: #4a7898; letter-spacing: 1.5px; }
  .amrow { display: flex; gap: 2px; flex-wrap: wrap; max-width: 130px; }
  .pp { width: 7px; height: 12px; border-radius: 1px; border: 0.5px solid; }
  .pp-y  { background: #1d9e75; border-color: #0f6e56; }
  .pp-ye { background: #0c1e2e; border-color: #1a3a5c; }
  .pp-b  { background: #d85a30; border-color: #993c1d; }
  .pp-be { background: #0c1e2e; border-color: #1a3a5c; }
  .wrow { display: flex; gap: 3px; margin-top: 1px; }
  .wp { width: 14px; height: 7px; border-radius: 1px; border: 0.5px solid; }
  .wp-y  { background: #1d9e75; border-color: #0f6e56; }
  .wp-ye { background: transparent; border-color: #1a3a5c; }
  .wp-b  { background: #d85a30; border-color: #993c1d; }
  .wp-be { background: transparent; border-color: #1a3a5c; }
  .cdwrap { display: flex; flex-direction: column; gap: 4px; align-items: center; }
  .cdlabel { font-size: 10px; color: #4a7898; letter-spacing: 1px; }
  .cdbg { width: 90px; height: 4px; background: #0c1e2e; border-radius: 2px; overflow: hidden; }
  .cdfill { height: 100%; background: #1d9e75; border-radius: 2px; width: 100%; transition: width .05s; }
  #cwrap { position: relative; line-height: 0; }
  canvas { display: block; width: 100%; cursor: crosshair; }
  #ol { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(6,14,24,0.93); }
  #ol h2 { font-size: 26px; font-weight: 500; letter-spacing: 5px; color: #c8e4f8; margin: 0 0 10px; }
  #ol p { font-size: 11px; color: #4a7898; margin: 0 0 4px; letter-spacing: 0.4px; text-align: center; padding: 0 20px; line-height: 2; }
  #sbtn { font-family: inherit; font-size: 12px; letter-spacing: 2px; padding: 10px 26px; background: transparent; border: 1px solid #1d9e75; color: #1d9e75; cursor: pointer; border-radius: 4px; margin-top: 14px; }
  #sbtn:hover { background: rgba(29,158,117,0.12); }
  #ctrlbar { padding: 7px 12px; font-size: 10px; color: #4a7898; border: 1px solid #1a3a5c; border-top: none; border-radius: 0 0 8px 8px; background: #0f1a27; text-align: center; letter-spacing: 0.4px; }
  .stlabel { font-size: 10px; margin-top: 1px; }
</style>
</head>
<body>
<div id="aw">
  <div id="hud">
    <div class="pi">
      <div class="pilabel">▶ YOU</div>
      <div class="amrow" id="pam"></div>
      <div class="wrow"  id="pwl"></div>
      <div class="stlabel" id="pst" style="color:#1d9e75">READY</div>
    </div>
    <div class="cdwrap">
      <div class="cdlabel">COOLDOWN</div>
      <div class="cdbg"><div class="cdfill" id="cdf"></div></div>
      <div style="font-size:9px;color:#4a7898;margin-top:2px">1.5s</div>
    </div>
    <div class="pi" style="align-items:flex-end">
      <div class="pilabel">BOT ◀</div>
      <div class="amrow" id="bam" style="justify-content:flex-end"></div>
      <div class="wrow"  id="bwl" style="justify-content:flex-end"></div>
      <div class="stlabel" id="bst" style="color:#d85a30">READY</div>
    </div>
  </div>
  <div id="cwrap">
    <canvas id="gc" width="680" height="490"></canvas>
    <div id="ol">
      <h2 id="olt">SNIPER ARENA</h2>
      <p id="olm">
        Bullets bounce off the cyan corner pads · One hit = out<br>
        15 shots each · 1.5s cooldown · 3 walls each<br><br>
        <span style="color:#7bc">WASD</span> Move &nbsp;·&nbsp;
        <span style="color:#7bc">Mouse</span> Aim &nbsp;·&nbsp;
        <span style="color:#7bc">Click</span> Shoot &nbsp;·&nbsp;
        <span style="color:#7bc">E</span> Place wall toward mouse
      </p>
      <button id="sbtn" onclick="startGame()">START MATCH</button>
    </div>
  </div>
  <div id="ctrlbar">WASD — Move &nbsp;|&nbsp; Click — Shoot &nbsp;|&nbsp; E — Place Wall in front of you</div>
</div>

<script>
const canvas = document.getElementById('gc');
const ctx    = canvas.getContext('2d');
const CW = 680, CH = 490, MG = 32;
const AR = { x: MG, y: MG, w: CW - MG * 2, h: CH - MG * 2 };
const PAD_R = 44;
const PADS = [
  { x: AR.x + PAD_R,          y: AR.y + PAD_R          },
  { x: AR.x + AR.w - PAD_R,   y: AR.y + PAD_R          },
  { x: AR.x + PAD_R,          y: AR.y + AR.h - PAD_R   },
  { x: AR.x + AR.w - PAD_R,   y: AR.y + AR.h - PAD_R   }
];

const PR = 12, BR = 4, BS = 8;
const PS   = 1.3;   // player speed
const BSPD = 1.8;   // bot speed
const MAXAMMO = 15, CD = 1500, MAXWALLS = 3;
const WL = 54, WT = 10; // wall long/thick sides

let gstate = 'menu';
let player, bot, bullets = [], walls = [], keys = {}, mouse = { x: 340, y: 245 };
let pST = 0, bST = 0;
let botMT = 0, botTarget = null, botSTimer = 0, botWTimer = 0;
let lastT = 0, raf;

const clamp = (v, a, b) => Math.max(a, Math.min(b, v));

// ─── HUD ─────────────────────────────────────────────────────────────────────
function buildAmmoHUD(id, amt, max, on, off) {
  const el = document.getElementById(id); el.innerHTML = '';
  for (let i = 0; i < max; i++) {
    const d = document.createElement('div');
    d.className = 'pp ' + (i < amt ? on : off);
    el.appendChild(d);
  }
}
function buildWallHUD(id, amt, max, on, off) {
  const el = document.getElementById(id); el.innerHTML = '';
  for (let i = 0; i < max; i++) {
    const d = document.createElement('div');
    d.className = 'wp ' + (i < amt ? on : off);
    el.appendChild(d);
  }
}
function updateHUD() {
  buildAmmoHUD('pam', player?.ammo  ?? MAXAMMO,  MAXAMMO,  'pp-y', 'pp-ye');
  buildAmmoHUD('bam', bot?.ammo     ?? MAXAMMO,  MAXAMMO,  'pp-b', 'pp-be');
  buildWallHUD('pwl', player?.walls ?? MAXWALLS, MAXWALLS, 'wp-y', 'wp-ye');
  buildWallHUD('bwl', bot?.walls    ?? MAXWALLS, MAXWALLS, 'wp-b', 'wp-be');
}

// ─── INIT ────────────────────────────────────────────────────────────────────
function initGame() {
  player = { x: AR.x + 70, y: AR.y + AR.h / 2, vx: 0, vy: 0, ammo: MAXAMMO, walls: MAXWALLS, alive: true };
  bot    = { x: AR.x + AR.w - 70, y: AR.y + AR.h / 2, vx: 0, vy: 0, ammo: MAXAMMO, walls: MAXWALLS, alive: true };
  bullets = []; walls = []; keys = {};
  pST = -9999; bST = -4500;
  botMT = 0; botTarget = null; botSTimer = 2200; botWTimer = 5500;
  updateHUD();
}

// ─── INPUT ───────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  if (!keys[k]) {
    keys[k] = true;
    if (k === 'e' && gstate === 'playing' && player?.alive) placeWall(player, 'player');
  }
  if (['arrowup','arrowdown','arrowleft','arrowright'].includes(k) && gstate === 'playing')
    e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });
canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mouse.x = (e.clientX - r.left) * (CW / r.width);
  mouse.y = (e.clientY - r.top)  * (CH / r.height);
});
canvas.addEventListener('click', () => {
  if (gstate !== 'playing' || !player?.alive) return;
  shoot(player, mouse.x - player.x, mouse.y - player.y, 'player');
});

// ─── WALL PLACEMENT ──────────────────────────────────────────────────────────
function placeWall(shooter, owner) {
  if (!shooter || !shooter.alive || shooter.walls <= 0) return;
  let dx, dy;
  if (owner === 'player') { dx = mouse.x - shooter.x; dy = mouse.y - shooter.y; }
  else                    { dx = player.x - shooter.x; dy = player.y - shooter.y; }
  const len = Math.hypot(dx, dy) || 1;
  const ax = dx / len, ay = dy / len;
  const cx = shooter.x + ax * 42, cy = shooter.y + ay * 42;
  const horiz = Math.abs(ax) <= Math.abs(ay);
  const ww = horiz ? WL : WT, wh = horiz ? WT : WL;
  const wx = clamp(cx - ww / 2, AR.x + 2, AR.x + AR.w - ww - 2);
  const wy = clamp(cy - wh / 2, AR.y + 2, AR.y + AR.h - wh - 2);
  walls.push({ x: wx, y: wy, w: ww, h: wh, owner });
  shooter.walls--;
  updateHUD();
}

// ─── SHOOTING ────────────────────────────────────────────────────────────────
function shoot(shooter, dx, dy, owner) {
  const now = performance.now();
  if (!shooter.alive || shooter.ammo <= 0) return;
  if (now - (owner === 'player' ? pST : bST) < CD) return;
  const len = Math.hypot(dx, dy); if (len < 0.01) return;
  if (owner === 'player') pST = now; else bST = now;
  shooter.ammo--;
  bullets.push({
    x: shooter.x + dx / len * (PR + 3),
    y: shooter.y + dy / len * (PR + 3),
    vx: dx / len * BS, vy: dy / len * BS,
    owner, born: now, trail: []
  });
  updateHUD();
}

// ─── GAME FLOW ───────────────────────────────────────────────────────────────
function startGame() {
  document.getElementById('ol').style.display = 'none';
  gstate = 'playing'; initGame();
  lastT = performance.now();
  if (raf) cancelAnimationFrame(raf);
  raf = requestAnimationFrame(loop);
}
function endGame(w) {
  gstate = 'over';
  const ol = document.getElementById('ol');
  const t  = document.getElementById('olt');
  const m  = document.getElementById('olm');
  ol.style.display = 'flex';
  document.getElementById('sbtn').textContent = 'PLAY AGAIN';
  if      (w === 'player') { t.textContent = 'VICTORY';   t.style.color = '#1d9e75'; m.textContent = 'You eliminated Bot.'; }
  else if (w === 'bot')    { t.textContent = 'ELIMINATED'; t.style.color = '#d85a30'; m.textContent = 'Bot took you out. Try again!'; }
  else                     { t.textContent = 'STALEMATE';  t.style.color = '#c8a030'; m.textContent = 'Both players ran out of ammo.'; }
}
function loop(ts) {
  if (gstate !== 'playing') return;
  const dt = Math.min(ts - lastT, 50); lastT = ts;
  update(dt); draw(ts);
  raf = requestAnimationFrame(loop);
}

// ─── COLLISION ───────────────────────────────────────────────────────────────
function bulletHitsWall(bx, by) {
  for (const w of walls)
    if (bx >= w.x - BR && bx <= w.x + w.w + BR && by >= w.y - BR && by <= w.y + w.h + BR) return true;
  return false;
}

// ─── UPDATE ──────────────────────────────────────────────────────────────────
function update(dt) {
  const now = performance.now();

  // Player movement
  let pdx = 0, pdy = 0;
  if (keys['w'] || keys['arrowup'])    pdy -= 1;
  if (keys['s'] || keys['arrowdown'])  pdy += 1;
  if (keys['a'] || keys['arrowleft'])  pdx -= 1;
  if (keys['d'] || keys['arrowright']) pdx += 1;
  if (pdx || pdy) {
    const l = Math.hypot(pdx, pdy);
    player.vx = pdx / l * PS;
    player.vy = pdy / l * PS;
  } else {
    player.vx = 0; player.vy = 0;
  }
  if (player.alive) {
    player.x = clamp(player.x + player.vx, AR.x + PR, AR.x + AR.w - PR);
    player.y = clamp(player.y + player.vy, AR.y + PR, AR.y + AR.h - PR);
  }

  // Bot AI
  if (bot.alive) {
    botMT -= dt; botSTimer -= dt; botWTimer -= dt;

    // Choose movement target
    if (botMT <= 0 || !botTarget) {
      botMT = 700 + Math.random() * 1100;
      const r = Math.random();
      if (r < 0.42) {
        // Chase player
        const a = Math.atan2(player.y - bot.y, player.x - bot.x);
        botTarget = {
          x: clamp(bot.x + Math.cos(a) * (80 + Math.random() * 120) + (Math.random() - .5) * 50, AR.x + PR + 10, AR.x + AR.w - PR - 10),
          y: clamp(bot.y + Math.sin(a) * (80 + Math.random() * 120) + (Math.random() - .5) * 50, AR.y + PR + 10, AR.y + AR.h - PR - 10)
        };
      } else if (r < 0.70) {
        // Strafe
        const a = Math.atan2(player.y - bot.y, player.x - bot.x) + Math.PI / 2 * (Math.random() > .5 ? 1 : -1);
        botTarget = {
          x: clamp(bot.x + Math.cos(a) * (60 + Math.random() * 100), AR.x + PR + 10, AR.x + AR.w - PR - 10),
          y: clamp(bot.y + Math.sin(a) * (60 + Math.random() * 100), AR.y + PR + 10, AR.y + AR.h - PR - 10)
        };
      } else {
        // Random roam
        botTarget = {
          x: AR.x + PR + 15 + Math.random() * (AR.w - PR * 2 - 30),
          y: AR.y + PR + 15 + Math.random() * (AR.h - PR * 2 - 30)
        };
      }
    }

    // Move toward target
    const bdx = botTarget.x - bot.x, bdy = botTarget.y - bot.y, bd = Math.hypot(bdx, bdy);
    if (bd > 4) { bot.vx = bdx / bd * BSPD; bot.vy = bdy / bd * BSPD; }
    else        { bot.vx = 0; bot.vy = 0; }
    bot.x = clamp(bot.x + bot.vx, AR.x + PR, AR.x + AR.w - PR);
    bot.y = clamp(bot.y + bot.vy, AR.y + PR, AR.y + AR.h - PR);

    // Bot shoot
    if (botSTimer <= 0 && bot.ammo > 0 && now - bST >= CD) {
      botSTimer = 500 + Math.random() * 900;
      if (Math.random() < 0.68) {
        // Predictive direct shot
        const lf = 8 + Math.random() * 10;
        const tx = player.x + player.vx * lf, ty = player.y + player.vy * lf;
        const a = Math.atan2(ty - bot.y, tx - bot.x) + (Math.random() - .5) * 0.07;
        shoot(bot, Math.cos(a), Math.sin(a), 'bot');
      } else {
        // Bounce shot off random pad
        const pad = PADS[Math.floor(Math.random() * 4)];
        const a = Math.atan2(pad.y - bot.y, pad.x - bot.x) + (Math.random() - .5) * 0.09;
        shoot(bot, Math.cos(a), Math.sin(a), 'bot');
      }
    }

    // Bot place wall
    if (botWTimer <= 0 && bot.walls > 0) {
      botWTimer = 4000 + Math.random() * 3500;
      placeWall(bot, 'bot');
    }
  }

  // Bullet update
  for (const b of bullets) {
    b.trail.push({ x: b.x, y: b.y });
    if (b.trail.length > 10) b.trail.shift();
    if (performance.now() - b.born > 5500) { b.dead = true; continue; }

    const nx = b.x + b.vx, ny = b.y + b.vy;
    if (bulletHitsWall(nx, ny)) { b.dead = true; continue; }
    b.x = nx; b.y = ny;

    // Corner pad bounce
    for (const p of PADS) {
      const dx = b.x - p.x, dy = b.y - p.y, dist = Math.hypot(dx, dy);
      if (dist < PAD_R && dist > 0) {
        const nx2 = dx / dist, ny2 = dy / dist, dot = b.vx * nx2 + b.vy * ny2;
        if (dot < 0) {
          b.vx -= 2 * dot * nx2; b.vy -= 2 * dot * ny2;
          b.x = p.x + nx2 * (PAD_R + 1); b.y = p.y + ny2 * (PAD_R + 1);
        }
      }
    }

    // Arena wall bounce
    if (b.x < AR.x)        { b.vx =  Math.abs(b.vx); b.x = AR.x + 1; }
    if (b.x > AR.x + AR.w) { b.vx = -Math.abs(b.vx); b.x = AR.x + AR.w - 1; }
    if (b.y < AR.y)        { b.vy =  Math.abs(b.vy); b.y = AR.y + 1; }
    if (b.y > AR.y + AR.h) { b.vy = -Math.abs(b.vy); b.y = AR.y + AR.h - 1; }

    // Hit detection
    if (b.owner === 'player' && bot.alive    && Math.hypot(b.x - bot.x,    b.y - bot.y)    < PR + BR) {
      bot.alive    = false; b.dead = true; setTimeout(() => endGame('player'), 350);
    }
    if (b.owner === 'bot'    && player.alive && Math.hypot(b.x - player.x, b.y - player.y) < PR + BR) {
      player.alive = false; b.dead = true; setTimeout(() => endGame('bot'), 350);
    }
  }
  bullets = bullets.filter(b => !b.dead);

  // Stalemate check
  if (player.alive && bot.alive && player.ammo <= 0 && bot.ammo <= 0 && bullets.length === 0)
    endGame('draw');

  // Cooldown HUD
  const pct = Math.min((performance.now() - pST) / CD, 1) * 100;
  document.getElementById('cdf').style.width = pct + '%';
  document.getElementById('pst').textContent = pct >= 100 ? 'READY' : 'RELOADING';
  document.getElementById('bst').textContent = (performance.now() - bST >= CD) ? 'READY' : 'RELOADING';
}

// ─── DRAW ────────────────────────────────────────────────────────────────────
function draw(ts) {
  ctx.fillStyle = '#06101a'; ctx.fillRect(0, 0, CW, CH);

  // Grid
  ctx.strokeStyle = '#0c1e2e'; ctx.lineWidth = 0.5;
  for (let x = AR.x; x <= AR.x + AR.w; x += 36) {
    ctx.beginPath(); ctx.moveTo(x, AR.y); ctx.lineTo(x, AR.y + AR.h); ctx.stroke();
  }
  for (let y = AR.y; y <= AR.y + AR.h; y += 36) {
    ctx.beginPath(); ctx.moveTo(AR.x, y); ctx.lineTo(AR.x + AR.w, y); ctx.stroke();
  }

  // Arena border
  ctx.strokeStyle = '#1a3a5c'; ctx.lineWidth = 1.5;
  ctx.strokeRect(AR.x, AR.y, AR.w, AR.h);

  // Bounce pads
  for (const p of PADS) {
    ctx.beginPath(); ctx.arc(p.x, p.y, PAD_R, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,100,180,0.13)'; ctx.fill();
    ctx.strokeStyle = '#1a6a9a'; ctx.lineWidth = 1.5; ctx.stroke();
    const pulse = 0.55 + 0.45 * Math.sin(ts * 0.0026);
    ctx.beginPath(); ctx.arc(p.x, p.y, PAD_R * 0.5 * pulse, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(0,160,220,${0.45 * pulse})`; ctx.lineWidth = 1; ctx.stroke();
    const s = 9; ctx.strokeStyle = 'rgba(0,160,220,0.4)'; ctx.lineWidth = 1.2;
    ctx.beginPath(); ctx.moveTo(p.x - s, p.y - s); ctx.lineTo(p.x + s, p.y + s); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(p.x + s, p.y - s); ctx.lineTo(p.x - s, p.y + s); ctx.stroke();
    ctx.fillStyle = 'rgba(0,160,220,0.35)'; ctx.font = '9px monospace';
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    ctx.fillText('BOUNCE', p.x, p.y + PAD_R * 0.58);
  }

  // Walls
  for (const w of walls) {
    ctx.fillStyle   = w.owner === 'player' ? 'rgba(29,158,117,0.55)' : 'rgba(216,90,48,0.55)';
    ctx.fillRect(w.x, w.y, w.w, w.h);
    ctx.strokeStyle = w.owner === 'player' ? '#1d9e75' : '#d85a30';
    ctx.lineWidth = 1.5; ctx.strokeRect(w.x, w.y, w.w, w.h);
  }

  // Bullet trails
  for (const b of bullets) {
    if (b.trail.length < 2) continue;
    ctx.beginPath(); ctx.moveTo(b.trail[0].x, b.trail[0].y);
    for (let i = 1; i < b.trail.length; i++) ctx.lineTo(b.trail[i].x, b.trail[i].y);
    ctx.strokeStyle = b.owner === 'player' ? 'rgba(29,158,117,0.35)' : 'rgba(216,90,48,0.35)';
    ctx.lineWidth = 1.5; ctx.stroke();
  }

  // Bullets
  for (const b of bullets) {
    ctx.beginPath(); ctx.arc(b.x, b.y, BR, 0, Math.PI * 2);
    ctx.fillStyle = b.owner === 'player' ? '#2dcf99' : '#e06832'; ctx.fill();
    ctx.beginPath(); ctx.arc(b.x, b.y, BR + 2, 0, Math.PI * 2);
    ctx.strokeStyle = b.owner === 'player' ? 'rgba(45,207,153,0.3)' : 'rgba(224,104,50,0.3)';
    ctx.lineWidth = 1.5; ctx.stroke();
  }

  // Characters
  if (bot.alive)    drawChar(bot,    '#d85a30', 'BOT');
  if (player.alive) drawChar(player, '#1d9e75', 'YOU');

  // Player aim line
  if (player?.alive && gstate === 'playing') {
    const dx = mouse.x - player.x, dy = mouse.y - player.y;
    const len = Math.hypot(dx, dy) || 1;
    const ex = player.x + dx / len * 55, ey = player.y + dy / len * 55;
    ctx.setLineDash([3, 5]); ctx.strokeStyle = 'rgba(29,158,117,0.4)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(player.x, player.y); ctx.lineTo(ex, ey); ctx.stroke();
    ctx.setLineDash([]);
    ctx.beginPath(); ctx.arc(ex, ey, 2.5, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(29,158,117,0.7)'; ctx.fill();
  }
}

function drawChar(p, col, name) {
  ctx.beginPath(); ctx.arc(p.x, p.y, PR, 0, Math.PI * 2);
  ctx.strokeStyle = col; ctx.lineWidth = 2; ctx.stroke();
  ctx.beginPath(); ctx.arc(p.x, p.y, PR - 3, 0, Math.PI * 2);
  ctx.fillStyle = col === '#1d9e75' ? 'rgba(29,158,117,0.15)' : 'rgba(216,90,48,0.15)'; ctx.fill();
  ctx.beginPath(); ctx.arc(p.x, p.y, 3.5, 0, Math.PI * 2); ctx.fillStyle = col; ctx.fill();
  ctx.fillStyle = col; ctx.font = 'bold 9px monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
  ctx.fillText(name, p.x, p.y - PR - 3);
}

// Init menu display
